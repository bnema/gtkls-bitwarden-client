version: 2

project_name: gtkls-bitwarden-client

builds:
  - id: gtkls-bitwarden-client
    main: ./cmd/gtkls-bitwarden-client
    binary: gtkls-bitwarden-client
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: linux
    ids:
      - gtkls-bitwarden-client
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  prerelease: auto

