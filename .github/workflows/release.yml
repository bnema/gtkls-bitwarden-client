name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    permissions:
      contents: write
    uses: bnema/gh-actions/.github/workflows/go-release.yml@0df6881622f94d8e82a0b7bd62cf52e2215f80d6
    with:
      go-version: stable
      pre-command: |
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
        make check
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
